<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diário do Além — chocollate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Lora:ital,wght@0,400..700;1,400..700&family=Jost:wght@300..600&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#110a17;
    --abyss:#1c1126;
    --abyss-2:#281634;
    --line:#3a2740;
    --amethyst:#a675ee;
    --amethyst-soft:#8456cf;
    --amethyst-dim:#4d3470;
    --crimson:#c0405c;
    --mist:#cdb6e6;
    --parchment:#f4ecf8;
    --stem:#43314c;
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    min-height:100vh;
    background:var(--void);
    color:var(--parchment);
    font-family:'Lora',serif;
    overflow-x:hidden;
    position:relative;
  }

  /* ---------- ambient shards ---------- */
  .shards{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
  .shard{
    position:absolute;
    width:22px;height:64px;
    background:linear-gradient(160deg,#8a3550,#3a1422);
    clip-path:polygon(50% 0%,100% 38%,58% 100%,42% 100%,0% 38%);
    opacity:.16;
    animation:drift 18s ease-in-out infinite;
  }
  .shard.amethyst{background:linear-gradient(160deg,#9d6fe6,#3c2a57);}
  .shard:nth-child(1){top:8%;left:6%;width:18px;height:50px;animation-duration:21s;}
  .shard:nth-child(2){top:62%;left:3%;width:26px;height:72px;animation-duration:26s;animation-delay:-4s;}
  .shard:nth-child(3){top:18%;left:92%;width:20px;height:58px;animation-duration:19s;animation-delay:-9s;}
  .shard:nth-child(4){top:74%;left:90%;width:30px;height:80px;animation-duration:24s;animation-delay:-2s;}
  .shard:nth-child(5){top:40%;left:50%;width:16px;height:44px;animation-duration:22s;animation-delay:-12s;opacity:.10;}
  .shard:nth-child(6){top:88%;left:30%;width:20px;height:56px;animation-duration:20s;animation-delay:-6s;}
  .shard:nth-child(7){top:4%;left:46%;width:18px;height:50px;animation-duration:23s;animation-delay:-15s;}
  @keyframes drift{
    0%,100%{transform:translateY(0) rotate(0deg);}
    50%{transform:translateY(-26px) rotate(10deg);}
  }

  /* ---------- shared layout ---------- */
  .view{position:relative;z-index:1;animation:viewIn .6s ease both;}
  .view.hidden{display:none;}
  @keyframes viewIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

  /* ---------- hero / cover ---------- */
  .hero{
    display:grid;
    grid-template-columns:minmax(240px,360px) 1fr;
    align-items:center;
    gap:clamp(2.5rem,6vw,5.5rem);
    max-width:1180px;
    margin:0 auto;
    padding:clamp(3rem,8vw,6rem) clamp(1.5rem,5vw,3rem) clamp(3.5rem,8vw,5rem);
  }
  .cover-wrap{position:relative;}
  .cover-glow{
    position:absolute;inset:-15%;
    background:radial-gradient(circle at 50% 35%,var(--amethyst-dim),transparent 70%);
    filter:blur(46px);
    opacity:.7;
    z-index:-1;
  }
  .cover-frame{
    position:relative;
    clip-path:polygon(7% 0%,100% 0%,100% 93%,93% 100%,0% 100%,0% 7%);
    background:linear-gradient(135deg,var(--amethyst),var(--crimson));
    padding:3px;
  }
  .cover-frame img{
    filter:saturate(1.08) contrast(1.05);
display:block;width:100%;height:auto;
    clip-path:polygon(7% 0%,100% 0%,100% 93%,93% 100%,0% 100%,0% 7%);
  }
  .vine-corner{position:absolute;width:128px;height:184px;overflow:visible;}
  .vine-tl{top:-34px;left:-46px;}
  .vine-br{bottom:-34px;right:-46px;transform:rotate(180deg);}

  .hero-text{position:relative;}
  .eyebrow{
    font-family:'Jost',sans-serif;font-weight:500;
    font-size:.72rem;letter-spacing:.32em;text-transform:uppercase;
    color:var(--amethyst);margin:0 0 .6rem;
  }
  h1.title{
    font-family:'Fraunces',serif;font-weight:600;
    font-variation-settings:'opsz' 144,'SOFT' 10,'WONK' 1;
    font-size:clamp(2.6rem,6.2vw,4.4rem);
    line-height:1.05;letter-spacing:-.01em;
    margin:0;color:var(--parchment);
  }
  .title-rule{
    width:84px;height:3px;margin:1rem 0 1.1rem;
    background:linear-gradient(90deg,var(--crimson),var(--amethyst));
  }
  .hero-text .by{
    font-family:'Jost',sans-serif;font-weight:300;font-style:italic;
    font-size:1rem;letter-spacing:.08em;
    color:var(--mist);margin:0 0 1.4rem;
  }
  .hero-text .by::before{content:'escrito por ';font-style:normal;opacity:.7;}
  blockquote{
    font-family:'Fraunces',serif;font-style:italic;font-weight:400;
    font-size:1.18rem;line-height:1.65;
    color:var(--mist);
    border-left:2px solid var(--crimson);
    padding-left:1.1rem;margin:0;max-width:30ch;
  }
  .cta{
    display:inline-flex;align-items:center;gap:.65rem;
    font-family:'Jost',sans-serif;font-weight:500;font-size:.92rem;
    letter-spacing:.12em;text-transform:uppercase;
    color:var(--parchment);
    background:linear-gradient(135deg,var(--amethyst-soft),var(--crimson));
    border:none;cursor:pointer;
    padding:.95rem 1.9rem;margin-top:2rem;
    clip-path:polygon(5% 0,100% 0,100% 68%,95% 100%,0 100%,0 32%);
    transition:transform .25s ease,box-shadow .25s ease;
  }
  .cta:hover{transform:translateY(-2px);box-shadow:0 10px 32px -10px var(--amethyst);}
  .cta svg{width:18px;height:18px;flex-shrink:0;}

  /* ---------- index ---------- */
  .index{max-width:740px;margin:0 auto;padding:0 clamp(1.5rem,5vw,3rem) 6rem;}
  .vine-divider{display:flex;justify-content:center;margin:0 auto 1rem;width:100%;max-width:480px;}
  .vine-divider svg{width:100%;height:42px;}
  .index-head{text-align:center;margin-bottom:2.2rem;}
  .index-head .eyebrow{justify-content:center;display:block;text-align:center;}
  .index-head h2{
    font-family:'Fraunces',serif;font-weight:600;font-size:1.9rem;
    margin:.4rem 0 0;letter-spacing:.04em;color:var(--parchment);
  }
  ul.chapter-list{list-style:none;margin:0;padding:0;border-top:1px solid var(--line);}
  .chapter-item button{
    all:unset;
    display:flex;align-items:center;gap:1.1rem;
    width:100%;padding:1.05rem .6rem;
    cursor:pointer;border-bottom:1px solid var(--line);
    transition:background .25s ease,padding-left .25s ease;
  }
  .chapter-item button:hover{background:var(--abyss-2);}
  .chapter-item.interludio button{padding-left:2.4rem;}
  .chapter-item.interludio button:hover{padding-left:2.7rem;}
  .chapter-icon{
    flex-shrink:0;width:26px;height:26px;opacity:.45;
    transition:opacity .25s ease,transform .25s ease,filter .25s ease;
  }
  .chapter-item button:hover .chapter-icon{
    opacity:1;transform:scale(1.18) rotate(-6deg);
    filter:drop-shadow(0 0 7px var(--amethyst));
  }
  .chapter-meta{display:flex;flex-direction:column;gap:.2rem;text-align:left;}
  .chapter-meta .num{
    font-family:'Jost',sans-serif;font-size:.68rem;font-weight:500;
    letter-spacing:.24em;text-transform:uppercase;color:var(--amethyst);
  }
  .chapter-meta .ttl{
    font-family:'Fraunces',serif;font-size:1.18rem;color:var(--parchment);
  }
  .chapter-item.interludio .num{color:var(--mist);}
  .chapter-item.interludio .ttl{font-style:italic;font-size:1.04rem;color:var(--mist);}
  .chapter-arrow{
    margin-left:auto;color:var(--crimson);font-family:'Jost',sans-serif;
    opacity:0;transform:translateX(-8px);
    transition:opacity .25s ease,transform .25s ease;
  }
  .chapter-item button:hover .chapter-arrow{opacity:1;transform:translateX(0);}

  .home-footer{
    text-align:center;font-family:'Jost',sans-serif;font-size:.74rem;
    letter-spacing:.28em;text-transform:uppercase;color:var(--stem);
    padding-bottom:3rem;
  }

  /* ---------- reader ---------- */
  #reader{max-width:660px;margin:0 auto;padding:clamp(2rem,5vw,3.2rem) clamp(1.25rem,5vw,2rem) 6rem;}
  .reader-nav{display:flex;justify-content:space-between;align-items:center;gap:1rem;}
  .back-btn{
    font-family:'Jost',sans-serif;font-size:.8rem;letter-spacing:.1em;
    color:var(--mist);background:none;border:1px solid var(--line);
    padding:.55rem 1.1rem;cursor:pointer;border-radius:1px;
    transition:border-color .2s ease,color .2s ease;
  }
  .back-btn:hover{border-color:var(--amethyst);color:var(--amethyst);}
  .reader-label{
    font-family:'Jost',sans-serif;font-size:.7rem;font-weight:500;
    letter-spacing:.3em;text-transform:uppercase;color:var(--amethyst);
    text-align:right;
  }
  .reader-title{
    font-family:'Fraunces',serif;font-weight:600;
    font-size:clamp(1.8rem,5.5vw,2.5rem);
    text-align:center;line-height:1.2;
    margin:1.6rem 0 2.4rem;color:var(--parchment);
  }
  #reader-content p{
    font-family:'Lora',serif;font-size:1.08rem;line-height:1.95;
    color:var(--parchment);margin:0 0 1.05rem;
  }
  .reader-controls{
    display:flex;justify-content:space-between;align-items:center;
    margin-top:3.2rem;gap:1rem;
  }
  .reader-controls button{
    font-family:'Jost',sans-serif;font-size:.82rem;letter-spacing:.08em;
    color:var(--parchment);background:none;border:1px solid var(--line);
    padding:.75rem 1.5rem;cursor:pointer;border-radius:1px;
    transition:border-color .2s ease,color .2s ease,transform .2s ease;
  }
  .reader-controls button:hover:not(:disabled){
    border-color:var(--crimson);color:var(--crimson);transform:translateY(-1px);
  }
  .reader-controls button:disabled{opacity:.3;cursor:default;}

  /* ---------- vine svg animation ---------- */
  .stem{fill:none;stroke:var(--stem);stroke-width:2.5;stroke-linecap:round;
    stroke-dasharray:1100;stroke-dashoffset:1100;
    animation:growStem 1.6s ease-out forwards;}
  .gem-anim{opacity:0;transform-origin:center;transform-box:fill-box;
    animation:bloomGem .7s ease-out forwards;animation-delay:1.1s;}
  .thorn{fill:#5a3f63;}
  @keyframes growStem{to{stroke-dashoffset:0;}}
  @keyframes bloomGem{from{opacity:0;transform:scale(.35);}to{opacity:1;transform:scale(1);}}

  @media (prefers-reduced-motion:reduce){
    .shard{animation:none!important;}
    .view{animation:none!important;}
    .stem{animation:none!important;stroke-dashoffset:0;}
    .gem-anim{animation:none!important;opacity:1;transform:scale(1);}
    .cta:hover{transform:none;}
  }

  @media (max-width:860px){
    .hero{grid-template-columns:1fr;text-align:center;}
    .hero-text{display:flex;flex-direction:column;align-items:center;}
    .title-rule{margin:1rem auto 1.1rem;}
    blockquote{text-align:left;}
    .vine-corner{display:none;}
    .cover-wrap{max-width:320px;margin:0 auto;}
  }
</style>

<style>
body::before{
content:'';
position:fixed;
left:0;top:0;bottom:0;
width:120px;
pointer-events:none;
opacity:.18;
background:
radial-gradient(circle at 30px 120px,#9d6fe6 0 8px,transparent 10px),
radial-gradient(circle at 60px 280px,#9d6fe6 0 7px,transparent 9px),
radial-gradient(circle at 25px 520px,#9d6fe6 0 8px,transparent 10px);
filter:blur(.2px);
}
body::after{
content:'';
position:fixed;
right:0;top:0;bottom:0;
width:120px;
pointer-events:none;
opacity:.18;
background:
radial-gradient(circle at 90px 180px,#9d6fe6 0 8px,transparent 10px),
radial-gradient(circle at 50px 420px,#9d6fe6 0 7px,transparent 9px),
radial-gradient(circle at 95px 700px,#9d6fe6 0 8px,transparent 10px);
}
.hero{
filter:drop-shadow(0 0 25px rgba(166,117,238,.15));
}
.cover-frame{
box-shadow:0 0 40px rgba(166,117,238,.25);
}
.chapter-item button:hover{
box-shadow:inset 0 0 18px rgba(166,117,238,.12);
}
</style>

</head>
<body>

<div class="shards" aria-hidden="true">
  <div class="shard"></div>
  <div class="shard amethyst"></div>
  <div class="shard"></div>
  <div class="shard amethyst"></div>
  <div class="shard"></div>
  <div class="shard amethyst"></div>
  <div class="shard"></div>
</div>

<!-- shared SVG defs: faceted violet "gem-flower" + thorns -->
<svg aria-hidden="true" focusable="false" style="position:absolute;width:0;height:0;overflow:hidden">
  <defs>
    <linearGradient id="gemGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dcc2ff"/>
      <stop offset="1" stop-color="#7b4fc4"/>
    </linearGradient>
    <path id="petal" d="M24 24 L31 4 L38 18 Z"/>
    <symbol id="gem" viewBox="0 0 48 48">
      <g fill="url(#gemGrad)">
        <use href="#petal" xlink:href="#petal" transform="rotate(0 24 24)"/>
        <use href="#petal" xlink:href="#petal" transform="rotate(72 24 24)"/>
        <use href="#petal" xlink:href="#petal" transform="rotate(144 24 24)"/>
        <use href="#petal" xlink:href="#petal" transform="rotate(216 24 24)"/>
        <use href="#petal" xlink:href="#petal" transform="rotate(288 24 24)"/>
      </g>
      <path d="M24 16 L32 24 L24 32 L16 24 Z" fill="#f4e9ff"/>
      <path d="M24 19.5 L28.5 24 L24 28.5 L19.5 24 Z" fill="#c0405c"/>
    </symbol>
    <symbol id="thorn" viewBox="0 0 16 16">
      <path d="M8 1 L15 15 L1 15 Z" fill="#5a3f63"/>
      <path d="M8 1 L11.5 15 L1 15 Z" fill="#3c2945"/>
    </symbol>
  </defs>
</svg>

<script>
const chapters = [{"kind": "prologo", "number": "", "title": "Prólogo", "html": "<p>Não me lembro quando despertei.</p>\n        <p>Apenas da escuridão.</p>\n        <p>No Reino Demoníaco, onde a rotina veste máscaras de normalidade, vivi como qualquer outro demônio.</p>\n        <p>Família.</p>\n        <p>Casa.</p>\n        <p>Dias comuns.</p>\n        <p>Nada faltava.</p>\n        <p>E ainda assim, algo faltava.</p>\n        <p>Como uma página arrancada antes mesmo de eu abrir o livro da minha vida.</p>\n        <p>Iniciei um livro</p>\n        <p>Sem direito a prefácio.</p>\n        <p>As histórias antigas ocupavam espaço demais dentro de mim.</p>\n        <p>Caixas empoeiradas guardavam memórias que nunca vivi.</p>\n        <p>E entre o silêncio dos objetos esquecidos, crescia a sensação de estar no mundo errado.</p>\n        <p>Na linha tênue entre mim e a verdade, a melancolia sempre encontrava uma fresta para entrar.</p>\n        <p>Às vezes parecia repressão.</p>\n        <p>Às vezes parecia saudade.</p>\n        <p>De algo que nunca conheci.</p>\n        <p>De alguém que talvez eu tenha sido.</p>\n        <p>Minha metade diz que viver sozinho não faz parte.</p>\n        <p>Aos poucos, minha identidade escorria pelos dedos.</p>\n        <p>Eu observava os outros seguirem seus caminhos enquanto eu me tornava uma pergunta sem resposta.</p>\n        <p>Uma anomalia.</p>\n        <p>Um erro de medida.</p>\n        <p>Um fragmento que não se encaixava.</p>\n        <p>Aceitei que jamais teria uma vida igual à deles.</p>\n        <p>Porque só tenho a minha.</p>\n        <p>Mas, conforme os dias passavam, uma certeza começava a nascer dentro de mim:</p>\n        <p>O vazio que eu carregava não era ausência.</p>\n        <p>Era um chamado.</p>\n        <p>E, em algum lugar além do Reino Demoníaco, algo parecia estar me procurando também.</p>"}, {"kind": "capitulo", "number": "Capítulo 1", "title": "O Clarão", "html": "<p>Em um dia comum,</p>\n        <p>daqueles que nascem sem promessas</p>\n        <p>e terminam sem serem lembrados,</p>\n        <p>o impossível aconteceu.</p>\n        <p>Saí de casa como em qualquer outra manhã.</p>\n        <p>As ruas eram as mesmas.</p>\n        <p>O céu era o mesmo.</p>\n        <p>As vozes ao redor eram as mesmas.</p>\n        <p>Então veio a luz.</p>\n        <p>Um clarão.</p>\n        <p>Tão intenso que engoliu o horizonte, as cidades, as montanhas e cada pedaço do Reino Demoníaco.</p>\n        <p>Por um instante, o mundo inteiro desapareceu.</p>\n        <p>Quando abri os olhos...</p>\n        <p>O céu era diferente.</p>\n        <p>O ar era diferente.</p>\n        <p>Tudo era diferente.</p>\n        <p>Eu estava deitado sobre um altar de pedra antiga.</p>\n        <p>Ao meu redor, apenas uma vasta planície que se estendia até onde a vista alcançava.</p>\n        <p>Nenhuma cidade.</p>\n        <p>Nenhum som.</p>\n        <p>Nenhum sinal de casa.</p>\n        <p>Apenas vento.</p>\n        <p>E um silêncio que parecia observar minha existência.</p>\n        <p>Talvez eu estivesse sonhando.</p>\n        <p>Talvez tivesse morrido.</p>\n        <p>Talvez, pela primeira vez,</p>\n        <p>eu estivesse exatamente onde deveria estar.</p>\n        <p>Enquanto me levantava do altar, uma sensação estranha tomou conta de mim.</p>\n        <p>O vazio que me acompanhara por toda a vida havia diminuído.</p>\n        <p>Como se aquele lugar desconhecido reconhecesse minha presença.</p>\n        <p>Como se eu não fosse um estranho ali.</p>\n        <p>Como se o mundo errado tivesse ficado para trás.</p>\n        <p>E o verdadeiro começo da minha história estivesse apenas começando.</p>"}, {"kind": "interludio", "number": "Capítulo 1.5", "title": "Ecos de um Mundo Esquecido", "html": "<p>Desci do altar sem saber para onde ir.</p>\n        <p>Sem mapas.</p>\n        <p>Sem explicações.</p>\n        <p>Sem ninguém.</p>\n        <p>Apenas a estranha sensação de que aquele lugar já me conhecia.</p>\n        <p>Caminhei por algum tempo até avistar algo no horizonte.</p>\n        <p>Uma estrutura colossal.</p>\n        <p>Torres de metal cortavam o céu enquanto enormes tubulações atravessavam o terreno como veias de aço.</p>\n        <p>Uma usina.</p>\n        <p>Mas havia algo errado.</p>\n        <p>Nenhuma fumaça.</p>\n        <p>Nenhum ruído.</p>\n        <p>Nenhuma vida.</p>\n        <p>Tudo permanecia imóvel.</p>\n        <p>Como se o tempo tivesse parado.</p>\n        <p>Então corri.</p>\n        <p>Atravessei campos secos e mergulhei em uma floresta densa.</p>\n        <p>Mas quanto mais avançava...</p>\n        <p>Mais construções apareciam.</p>\n        <p>Prédios cobertos por raízes.</p>\n        <p>Estradas partidas.</p>\n        <p>Pontes sem destino.</p>\n        <p>Estruturas estranhas abandonadas pelo tempo.</p>\n        <p>Era como caminhar pelas ruínas de uma memória.</p>\n        <p>Um mundo inteiro ainda estava ali.</p>\n        <p>Mas seus habitantes não.</p>"}, {"kind": "capitulo", "number": "Capítulo 2", "title": "Coisas que Deveriam Estar Mortas", "html": "<p>O sol começava a desaparecer.</p>\n        <p>Encontrei um espaço entre as árvores e me sentei para descansar.</p>\n        <p>Então ouvi um assobio.</p>\n        <p>Algo atingiu o chão ao meu lado.</p>\n        <p>Uma flecha.</p>\n        <p>Olhei para frente.</p>\n        <p>E congelei.</p>\n        <p>Um esqueleto segurava um arco.</p>\n        <p>Um esqueleto vivo.</p>\n        <p>Não.</p>\n        <p>Aquilo era impossível.</p>\n        <p>Então ouvi galhos quebrando.</p>\n        <p>Atrás.</p>\n        <p>À esquerda.</p>\n        <p>À direita.</p>\n        <p>Quando percebi...</p>\n        <p>Eu estava cercado.</p>\n        <p>Zumbis.</p>\n        <p>Esqueletos.</p>\n        <p>Criaturas deformadas.</p>\n        <p>Monstros.</p>\n        <p>— MAS QUÊ?!</p>\n        <p>No Reino Demoníaco, monstros haviam sido exterminados eras atrás.</p>\n        <p>Aquilo não deveria existir.</p>\n        <p>E ainda assim estavam ali.</p>\n        <p>Me cercando na escuridão.</p>"}, {"kind": "capitulo", "number": "Capítulo 3", "title": "Convocado", "html": "<p>Uma flecha atravessou minhas costas.</p>\n        <p>Depois meu coração.</p>\n        <p>O mundo perdeu as cores.</p>\n        <p>Tudo se tornou carmesim.</p>\n        <p>Dor.</p>\n        <p>Agonia.</p>\n        <p>Desespero.</p>\n        <p>Então escuridão.</p>\n        <p>Mas uma voz me puxou de volta.</p>\n        <p>Abri os olhos.</p>\n        <p>O altar.</p>\n        <p>A mesma noite.</p>\n        <p>O mesmo céu.</p>\n        <p>Levantei num salto.</p>\n        <p>Nenhum ferimento.</p>\n        <p>Nenhum sangue.</p>\n        <p>Foi então que vi um homem próximo.</p>\n        <p>— EI! FOI VOCÊ QUE ME COLOCOU AQUI?! O QUE TÁ ACONTECENDO?!</p>\n        <p>Ele apenas suspirou.</p>\n        <p>— Calma aí, afobado. Você é novato, né?</p>\n        <p>— Novato?</p>\n        <p>— Seguinte, mano... você foi convocado.</p>\n        <p>— Convocado?</p>\n        <p>— Por Kiros.</p>\n        <p>— E por quê?</p>\n        <p>— Não sei.</p>\n        <p>— Como assim não sabe?!</p>\n        <p>— Porque ninguém sabe.</p>"}, {"kind": "interludio", "number": "Capítulo 3.5", "title": "A Benção", "html": "<p>— O resumo é simples.</p>\n        <p>O homem cruzou os braços.</p>\n        <p>— Todos os convocados por Kiros vieram para este mundo por um motivo desconhecido.</p>\n        <p>— E parece que você acabou de desfrutar da Benção pela primeira vez.</p>\n        <p>— Benção?</p>\n        <p>Ele apontou para meu peito.</p>\n        <p>— Você morreu, não morreu?</p>\n        <p>Fiquei em silêncio.</p>\n        <p>— Então.</p>\n        <p>— Nenhum dos convocados morre de verdade.</p>\n        <p>— Sempre retornam.</p>\n        <p>As palavras demoraram para fazer sentido.</p>\n        <p>Sempre retornam.</p>\n        <p>— Então somos imortais?</p>\n        <p>Ele riu.</p>\n        <p>— Não.</p>\n        <p>— Isso seria muito fácil.</p>\n        <p>Por um instante seus olhos pareceram cansados.</p>\n        <p>— Você sente dor.</p>\n        <p>— Você sente medo.</p>\n        <p>— Você sente o momento exato em que sua vida acaba.</p>\n        <p>— A única diferença é que depois você acorda.</p>\n        <p>A morte não era o fim.</p>\n        <p>Era apenas uma porta.</p>\n        <p>— Bem-vindo ao mundo de Kiros, novato.</p>\n        <p>— Aqui ninguém morre.</p>\n        <p>Ele sorriu.</p>\n        <p>— Mas isso não significa que você não possa desejar morrer.</p>"}, {"kind": "capitulo", "number": "Capítulo 4", "title": "Um Céu Diferente", "html": "<p>— Enfim falou.</p>\n        <p>Foi a última coisa que ouvi dele.</p>\n        <p>Então o homem simplesmente levantou voo.</p>\n        <p>E eu fiquei sozinho outra vez.</p>\n        <p>Minha cabeça girava.</p>\n        <p>Kiros.</p>\n        <p>Convocados.</p>\n        <p>Benção.</p>\n        <p>Morte.</p>\n        <p>Nenhuma resposta fazia sentido.</p>\n        <p>Mas, pela primeira vez em muito tempo, eu não me importava tanto.</p>\n        <p>Saí do altar.</p>\n        <p>Sem destino.</p>\n        <p>Sem objetivo.</p>\n        <p>Apenas andando.</p>\n        <p>Encontrei uma estrada antiga.</p>\n        <p>Ela atravessava montanhas silenciosas.</p>\n        <p>Ao longe, uma enorme estátua observava o horizonte.</p>\n        <p>Seu nome havia sido esquecido.</p>\n        <p>Mas sua presença permanecia.</p>\n        <p>Continuei seguindo o caminho.</p>\n        <p>Até que a terra terminou.</p>\n        <p>E o mar começou.</p>\n        <p>Além das águas havia uma pequena ilha.</p>\n        <p>Mergulhei.</p>\n        <p>Nadei.</p>\n        <p>Até alcançar a areia.</p>\n        <p>Respirei fundo.</p>\n        <p>E me deixei cair.</p>\n        <p>O céu se estendia acima de mim.</p>\n        <p>Infinito.</p>\n        <p>Desconhecido.</p>\n        <p>Livre.</p>\n        <p>Levantei uma das mãos.</p>\n        <p>Como se pudesse alcançar algo além das estrelas.</p>\n        <p>Parece que essa é minha nova vida agora.</p>\n        <p>E, estranhamente...</p>\n        <p>Aquela ideia não me assustava.</p>\n        <p>O desespero virou alívio.</p>\n        <p>O alívio virou paz.</p>\n        <p>E a paz, lentamente, virou felicidade.</p>\n        <p>Talvez eu devesse querer voltar para casa.</p>\n        <p>Mas observando aquele céu estranho, percebi uma verdade:</p>\n        <p>Talvez eu nunca tenha pertencido ao Reino Demoníaco.</p>\n        <p>Talvez o vazio que carreguei a vida inteira fosse apenas o espaço reservado para este momento.</p>\n        <p>E pela primeira vez desde que me lembrava de existir...</p>\n        <p>Eu não sentia que estava no lugar errado.</p>\n        <p>Eu apenas existia.</p>\n        <p>E isso era suficiente.</p>"}];

const listEl = document.getElementById('chapter-list');
chapters.forEach((ch,i)=>{
  const li = document.createElement('li');
  li.className = 'chapter-item' + (ch.kind === 'interludio' ? ' interludio' : '');
  let label;
  if(ch.kind === 'prologo') label = 'Abertura';
  else if(ch.kind === 'interludio') label = ch.number + ' · interlúdio';
  else label = ch.number;
  li.innerHTML =
    '<button type="button" aria-label="Abrir ' + ch.title + '">' +
      '<svg class="chapter-icon" viewBox="0 0 48 48" aria-hidden="true"><use href="#gem" xlink:href="#gem"/></svg>' +
      '<span class="chapter-meta"><span class="num">' + label + '</span><span class="ttl">' + ch.title + '</span></span>' +
      '<span class="chapter-arrow">→</span>' +
    '</button>';
  li.querySelector('button').addEventListener('click', ()=>openChapter(i));
  listEl.appendChild(li);
});

let current = 0;
const homeEl = document.getElementById('home');
const readerEl = document.getElementById('reader');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');

function openChapter(i){
  current = i;
  const ch = chapters[i];
  document.getElementById('reader-label').textContent =
    ch.kind === 'prologo' ? 'Abertura' : (ch.kind === 'interludio' ? ch.number + ' · interlúdio' : ch.number);
  document.getElementById('reader-title').textContent = ch.title;
  document.getElementById('reader-content').innerHTML = ch.html;
  prevBtn.disabled = (i === 0);
  if(i === chapters.length - 1){
    nextBtn.textContent = 'Fim da Parte 1';
    nextBtn.disabled = true;
  } else {
    nextBtn.textContent = 'Próximo →';
    nextBtn.disabled = false;
  }
  homeEl.classList.add('hidden');
  readerEl.classList.remove('hidden');
  window.scrollTo(0,0);
}

function goHome(){
  readerEl.classList.add('hidden');
  homeEl.classList.remove('hidden');
  window.scrollTo(0,0);
}

prevBtn.addEventListener('click', ()=>{ if(current>0) openChapter(current-1); });
nextBtn.addEventListener('click', ()=>{ if(current<chapters.length-1) openChapter(current+1); });

document.addEventListener('keydown', e=>{
  if(readerEl.classList.contains('hidden')) return;
  if(e.key === 'ArrowRight' && current < chapters.length-1) openChapter(current+1);
  if(e.key === 'ArrowLeft' && current > 0) openChapter(current-1);
  if(e.key === 'Escape') goHome();
});
</script>
